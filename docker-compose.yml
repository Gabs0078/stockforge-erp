services:
  nginx:
    image: nginx:1.27-alpine
    container_name: stockforge_nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - public
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockforge_frontend
    expose:
      - "80"
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockforge_backend
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3001"
    networks:
      - internal
    restart: unless-stopped

  mysql:
    image: mariadb:11.4
    container_name: stockforge_mysql
    env_file:
      - ./.env
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    expose:
      - "3306"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -ustockforge_user -pstockforge_pass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true
